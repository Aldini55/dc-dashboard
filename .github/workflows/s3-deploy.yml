name: Deploy index.html to S3

on:
  push:
    branches: [main]
    paths:
      - "index.html"

env:
  AWS_REGION:  us-east-1
  BUCKET_NAME: aldairgc-upy-2026

jobs:
  deploy-s3:
    name: Sync static site to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Sync index.html to S3
        run: |
          aws s3 sync . s3://${{ env.BUCKET_NAME }} \
            --exclude "*" \
            --include "index.html" \
            --delete

      - name: Print live URL
        run: |
          echo "✅ Live at: http://${{ env.BUCKET_NAME }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com"
